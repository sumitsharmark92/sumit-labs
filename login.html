<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMIT-LABS // Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--cyan:#00d4ff;--green:#00ff88;--red:#ff3b5c;--text:#e2e8f0;--text3:#475569;--border:rgba(0,212,255,0.12);--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--font-heading:'Orbitron',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(0,212,255,0.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,0.04) 0%,transparent 50%);z-index:0}
.login-container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;animation:fadeIn .6s ease}
.login-logo{font-family:var(--font-heading);font-size:2rem;font-weight:900;color:var(--cyan);letter-spacing:4px;text-shadow:0 0 30px rgba(0,212,255,0.3);display:flex;align-items:center;gap:12px}
.login-logo .hex{font-size:1.6rem}
.login-sub{font-family:var(--font-mono);font-size:.7rem;color:var(--text3);letter-spacing:5px}
.login-box{background:rgba(20,20,35,0.7);border:1px solid var(--border);border-radius:16px;padding:40px 44px;width:400px;max-width:92vw;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:-1px;left:30px;right:30px;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.login-label{font-family:var(--font-mono);font-size:.6rem;color:var(--text3);letter-spacing:4px;margin-bottom:8px;display:block}
.login-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:var(--cyan);font-family:var(--font-mono);font-size:1rem;padding:14px 18px;letter-spacing:6px;outline:none;border-radius:10px;transition:border-color .3s,box-shadow .3s;margin-bottom:24px}
.login-input:focus{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,0.1)}
.login-btn{width:100%;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-heading);font-size:.75rem;font-weight:700;letter-spacing:4px;padding:16px;cursor:pointer;border-radius:10px;transition:all .3s;position:relative;overflow:hidden}
.login-btn:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 30px rgba(0,212,255,0.3)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-family:var(--font-mono);font-size:.7rem;color:var(--red);text-align:center;margin-top:14px;letter-spacing:1px;min-height:20px;transition:opacity .3s}
.login-footer{font-family:var(--font-mono);font-size:.55rem;color:var(--text3);letter-spacing:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
.shake{animation:shake .4s ease}
.particles{position:fixed;inset:0;z-index:0;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;opacity:.3;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.3}90%{opacity:.3}100%{transform:translateY(-10vh) scale(1);opacity:0}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="login-container">
  <div class="login-logo"><span class="hex">⬡</span> SUMIT-LABS</div>
  <div class="login-sub">ADMIN NEXUS // RESTRICTED ACCESS</div>
  <div class="login-box" id="login-box">
    <label class="login-label">ADMIN KEY</label>
    <input type="password" class="login-input" id="pwd" placeholder="••••••••" maxlength="32" autofocus>
    <button class="login-btn" id="login-btn" onclick="doLogin()">▸ AUTHENTICATE</button>
    <div class="login-error" id="login-err"></div>
  </div>
  <div class="login-footer">UNAUTHORIZED ACCESS IS MONITORED</div>
</div>
<script>
// Particles
(function(){const c=document.getElementById('particles');for(let i=0;i<40;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p);}})();

document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const pwd=document.getElementById('pwd').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  const box=document.getElementById('login-box');
  if(!pwd){err.textContent='⚠ ENTER PASSWORD';return;}
  btn.disabled=true;btn.textContent='AUTHENTICATING...';err.textContent='';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const d=await r.json();
    if(d.success&&d.token){
      sessionStorage.setItem('admin_token',d.token);
      btn.textContent='✓ ACCESS GRANTED';btn.style.borderColor='var(--green)';btn.style.color='var(--green)';
      err.style.color='var(--green)';err.textContent='Redirecting...';
      setTimeout(()=>window.location.href='/admin',800);
    }else{
      throw new Error(d.error||'Invalid credentials');
    }
  }catch(e){
    btn.disabled=false;btn.textContent='▸ AUTHENTICATE';
    err.textContent='⚠ ACCESS DENIED';
    box.classList.add('shake');setTimeout(()=>box.classList.remove('shake'),400);
    document.getElementById('pwd').value='';document.getElementById('pwd').focus();
  }
}
</script>
</body>
</html>
